name: main

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    tags:
      - "*"

  pull_request:
    branches:
      - main

jobs:
  check-package:
    name: Build & inspect our package.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: hynek/build-and-inspect-python-package@v2
  test:
    needs: [check-package]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        name: ["ubuntu-py39"]

        include:
          - name: "ubuntu-py39"
            python: "3.9"
            os: ubuntu-latest
            tox_env: "py39"
            use_coverage: true

    steps:
    - uses: actions/checkout@v5
    - name: Download built packages from the check-package job.
      uses: actions/download-artifact@v5
      with:
        name: Packages
        path: dist
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python }}
        allow-prereleases: true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        python -m pip install tox coverage

    - name: Test without coverage
      if: "! matrix.use_coverage"
      shell: bash
      run: "tox run -e ${{ matrix.tox_env }}  --installpkg dist/*.whl"

    - name: Test with coverage
      if: "matrix.use_coverage"
      shell: bash
      run: "tox run -e ${{ matrix.tox_env }}-coverage --installpkg dist/*.whl"

    - name: Upload coverage
      if: matrix.use_coverage && github.repository == 'pytest-dev/pluggy'
      uses: codecov/codecov-action@v5
      continue-on-error: true
      with:
        fail_ci_if_error: true
        files: ./coverage.xml
        verbose: true
        
  test-testmon:
    name: Run tests with pytest-testmon (with caching)
    needs: [check-package]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        name: ["ubuntu-py39"]

        include:
          - name: "ubuntu-py39"
            python: "3.9"
            os: ubuntu-latest
            tox_env: "py39"
            use_coverage: true

    steps:
      - uses: actions/checkout@v5
      - name: Download built packages from the check-package job.
        uses: actions/download-artifact@v5
        with:
          name: Packages
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install dependencies + pytest-testmon
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install pytest-testmon

      - name: Restore .testmondata cache
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmon-${{ github.ref_name }}
          restore-keys: |
            testmon-
            
      - name: First run (full, builds testmon cache)
        run: |
          pip install dist/*.whl
          time pytest --testmon

      - name: Save testmon cache
        uses: actions/cache/save@v4
        with:
          path: .testmondata
          key: testmon-${{ github.ref_name }}-${{ github.run_id }}

      - name: Second run (incremental)
        run: |
          echo "Running incremental testmon pass"
          time pytest --testmon
